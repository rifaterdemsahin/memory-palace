version: "3.9"

# 🏛️ Memory Palace — AI Infrastructure
# Qdrant (vector DB) + Ollama (local embeddings)
# Usage: docker compose up -d
# Docs: 4_Formula/qdrant_ollama_setup.md

services:

  # ── 🗄️ Qdrant Vector Database ─────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: memory-palace-qdrant
    ports:
      - "6333:6333"     # REST API  → http://localhost:6333
      - "6334:6334"     # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── 🤖 Ollama (Local Embeddings + LLM) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: memory-palace-ollama
    ports:
      - "11434:11434"   # REST API → http://localhost:11434
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped
    # GPU support (NVIDIA) — uncomment if available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  qdrant_storage:
    driver: local
  ollama_models:
    driver: local
